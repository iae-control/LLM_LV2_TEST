<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPL Winding Status Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #1c2333;
  --border-default: #30363d;
  --border-light: #3d444d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #656d76;
  --status-ok: #3fb950;
  --status-warning: #d29922;
  --status-critical: #f85149;
  --status-offline: #6e7681;
  --status-info: #58a6ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'IBM Plex Sans', 'Noto Sans KR', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}
.mono { font-family: 'JetBrains Mono', monospace; }
.condensed { font-family: 'IBM Plex Sans Condensed', sans-serif; }

/* Layout */
.app { display: grid; grid-template-columns: 200px 1fr; grid-template-rows: 44px 1fr; height: 100vh; }
.header { grid-column: 1 / -1; background: var(--bg-secondary); border-bottom: 1px solid var(--border-default); display: flex; align-items: center; padding: 0 16px; gap: 20px; }
.sidebar { background: var(--bg-secondary); border-right: 1px solid var(--border-default); padding: 8px 0; overflow-y: auto; }
.main { overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }

/* Header */
.header .status-group { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.header .sep { width: 1px; height: 20px; background: var(--border-default); }
.led { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.led.green { background: var(--status-ok); box-shadow: 0 0 4px var(--status-ok); }
.led.yellow { background: var(--status-warning); box-shadow: 0 0 4px var(--status-warning); }
.led.red { background: var(--status-critical); box-shadow: 0 0 4px var(--status-critical); }
.led.gray { background: var(--status-offline); }

/* Sidebar */
.nav-item { padding: 8px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text-secondary); transition: background 100ms; }
.nav-item:hover { background: var(--bg-tertiary); }
.nav-item.active { background: var(--bg-tertiary); color: var(--text-primary); border-left: 2px solid var(--status-info); }
.nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 12px 16px 4px; }

/* Cards */
.card { background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: 4px; }
.card-header { padding: 8px 12px; border-bottom: 1px solid var(--border-default); font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: space-between; }
.card-body { padding: 12px; }

/* Grid layout */
.grid-row { display: grid; gap: 12px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-top { grid-template-columns: 280px 1fr; }

/* Data fields */
.field { margin-bottom: 6px; }
.field-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
.field-value { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text-primary); }
.field-value.large { font-size: 18px; font-weight: 500; }

/* Layer Grid */
.layer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
.layer-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 4px; border: 1px solid var(--border-default); border-radius: 3px; min-height: 48px; transition: border-color 150ms; }
.layer-cell .layer-idx { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; font-family: 'JetBrains Mono', monospace; }
.layer-cell .layer-st { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; }
.layer-cell.N { background: rgba(63,185,80,0.12); border-color: rgba(63,185,80,0.3); }
.layer-cell.N .layer-st { color: var(--status-ok); }
.layer-cell.T { background: rgba(210,153,34,0.12); border-color: rgba(210,153,34,0.3); }
.layer-cell.T .layer-st { color: var(--status-warning); }
.layer-cell.H { background: rgba(248,81,73,0.12); border-color: rgba(248,81,73,0.3); }
.layer-cell.H .layer-st { color: var(--status-critical); }
.layer-cell.U { background: rgba(110,118,129,0.08); border-color: rgba(110,118,129,0.2); }
.layer-cell.U .layer-st { color: var(--status-offline); }

@keyframes value-update {
  0% { box-shadow: inset 0 0 0 2px rgba(88,166,255,0.5); }
  100% { box-shadow: inset 0 0 0 2px transparent; }
}
.layer-cell.flash { animation: value-update 800ms ease-out; }

.layer-stats { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; }
.layer-stats .stat { display: flex; align-items: center; gap: 4px; }
.layer-stats .dot { width: 8px; height: 8px; border-radius: 2px; }
.layer-stats .dot.N { background: var(--status-ok); }
.layer-stats .dot.T { background: var(--status-warning); }
.layer-stats .dot.H { background: var(--status-critical); }
.layer-stats .dot.U { background: var(--status-offline); }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(--border-default); }
.tab { padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--status-info); border-bottom-color: var(--status-info); }

/* Forms */
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.form-group { display: flex; flex-direction: column; gap: 2px; }
.form-group label { font-size: 11px; color: var(--text-muted); }
.form-group input, .form-group select {
  background: var(--bg-primary); border: 1px solid var(--border-default);
  color: var(--text-primary); font-family: 'JetBrains Mono', monospace;
  font-size: 13px; padding: 5px 8px; border-radius: 3px; outline: none;
}
.form-group input:focus, .form-group select:focus { border-color: var(--status-info); }
.btn { padding: 6px 16px; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 100ms; font-family: 'IBM Plex Sans', sans-serif; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--status-info); color: #fff; }
.btn-danger { background: var(--status-critical); color: #fff; }
.btn-success { background: var(--status-ok); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.form-actions { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.form-msg { font-size: 12px; color: var(--status-ok); }

/* Log */
.log-filters { display: flex; gap: 6px; padding: 6px 12px; border-bottom: 1px solid var(--border-default); flex-wrap: wrap; }
.log-filter { padding: 2px 8px; font-size: 11px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border-default); background: transparent; color: var(--text-secondary); }
.log-filter.active { background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--status-info); }
.log-list { max-height: 200px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; }
.log-list.full { max-height: none; flex: 1; }
.log-entry { padding: 2px 12px; border-bottom: 1px solid rgba(48,54,61,0.3); display: flex; gap: 8px; }
.log-entry:hover { background: var(--bg-tertiary); }
.log-time { color: var(--text-muted); flex-shrink: 0; }
.log-dir { font-weight: 600; flex-shrink: 0; width: 22px; }
.log-dir.TX { color: var(--status-info); }
.log-dir.RX { color: var(--status-ok); }
.log-tc { color: var(--status-warning); flex-shrink: 0; width: 48px; }
.log-detail { color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Line status */
.line-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 3px; font-size: 12px; font-weight: 500; }
.line-badge.ok { background: rgba(63,185,80,0.12); color: var(--status-ok); border: 1px solid rgba(63,185,80,0.2); }
.line-badge.ng { background: rgba(248,81,73,0.12); color: var(--status-critical); border: 1px solid rgba(248,81,73,0.2); }

/* Received info */
.rx-info { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 12px; }
.rx-info .rx-item { display: flex; gap: 6px; padding: 2px 0; }
.rx-info .rx-label { color: var(--text-muted); min-width: 60px; }
.rx-info .rx-val { color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }

/* Toggle */
.toggle { position: relative; width: 36px; height: 20px; border-radius: 10px; background: var(--border-default); cursor: pointer; transition: background 200ms; }
.toggle.on { background: var(--status-ok); }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform 200ms; }
.toggle.on::after { transform: translateX(16px); }

/* Empty state */
.empty { text-align: center; padding: 24px; color: var(--text-muted); font-size: 13px; }

/* WS status */
.ws-badge { font-size: 11px; padding: 2px 6px; border-radius: 3px; }
.ws-badge.connected { background: rgba(63,185,80,0.15); color: var(--status-ok); }
.ws-badge.disconnected { background: rgba(110,118,129,0.15); color: var(--status-offline); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const API_BASE = 'http://localhost:8080';
const WS_URL = 'ws://localhost:8080/ws';

// =========================================
// WebSocket Hook
// =========================================
function useWebSocket(url) {
  const [wsState, setWsState] = useState('disconnected');
  const wsRef = useRef(null);
  const handlersRef = useRef({});
  const reconnectTimer = useRef(null);

  const connect = useCallback(() => {
    if (wsRef.current && wsRef.current.readyState <= 1) return;
    setWsState('connecting');
    try {
      const ws = new WebSocket(url);
      ws.onopen = () => { setWsState('connected'); };
      ws.onclose = () => {
        setWsState('disconnected');
        wsRef.current = null;
        reconnectTimer.current = setTimeout(connect, 3000);
      };
      ws.onerror = () => {};
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          const handler = handlersRef.current[msg.type];
          if (handler) handler(msg.data);
        } catch(err) {}
      };
      wsRef.current = ws;
    } catch(e) {
      setTimeout(connect, 3000);
    }
  }, [url]);

  useEffect(() => {
    connect();
    return () => {
      if (reconnectTimer.current) clearTimeout(reconnectTimer.current);
      if (wsRef.current) wsRef.current.close();
    };
  }, [connect]);

  const on = useCallback((type, handler) => {
    handlersRef.current[type] = handler;
  }, []);

  return { wsState, on };
}

// =========================================
// API Hook
// =========================================
function useApi() {
  const post = useCallback(async (path, body) => {
    try {
      const res = await fetch(API_BASE + path, {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body || {})
      });
      return await res.json();
    } catch(e) { return { success: false, error: e.message }; }
  }, []);
  const get = useCallback(async (path) => {
    try {
      const res = await fetch(API_BASE + path);
      return await res.json();
    } catch(e) { return null; }
  }, []);
  return { post, get };
}

// =========================================
// Header Component
// =========================================
function Header({ tcpState, wsState, aliveData, lastRx }) {
  const tcpColor = tcpState === 'alive_ok' ? 'green' : tcpState === 'connected' ? 'yellow' : tcpState === 'alive_timeout' ? 'red' : 'gray';
  const tcpLabel = { disconnected:'L2 미접속', connected:'L2 접속', alive_ok:'Alive 정상', alive_timeout:'Alive 타임아웃' }[tcpState] || 'Unknown';

  return (
    <div className="header">
      <div style={{fontWeight:700,fontSize:14,letterSpacing:'0.5px'}} className="condensed">SPL MONITOR</div>
      <div className="sep"/>
      <div className="status-group"><span className={`led ${tcpColor}`}/> <span>{tcpLabel}</span></div>
      <div className="sep"/>
      <div className="status-group"><span className="mono" style={{fontSize:12}}>TX(1199):{String(aliveData.tx||0).padStart(4,'0')} RX(1099):{String(aliveData.rx||0).padStart(4,'0')}</span></div>
      <div className="sep"/>
      <div className="status-group"><span style={{color:'var(--text-muted)',fontSize:12}}>Last L2 Alive: </span><span className="mono" style={{fontSize:12}}>{lastRx || '--:--:--'}</span></div>
      <div className="sep"/>
      <div className="status-group">
        A: <span className={`line-badge ${aliveData.workA==='01'?'ok':'ng'}`}>{aliveData.workA==='01'?'정상':'비정상'}</span>
        B: <span className={`line-badge ${aliveData.workB==='01'?'ok':'ng'}`}>{aliveData.workB==='01'?'정상':'비정상'}</span>
      </div>
      <div style={{flex:1}}/>
      <span className={`ws-badge ${wsState==='connected'?'connected':'disconnected'}`}>WS: {wsState}</span>
    </div>
  );
}

// =========================================
// LayerGrid Component (Core Widget)
// =========================================
function LayerGrid({ layers, layerCount }) {
  const [flashIdx, setFlashIdx] = useState(new Set());
  const prevLayers = useRef(layers);

  useEffect(() => {
    const changed = new Set();
    if (prevLayers.current) {
      for (let i = 0; i < 25; i++) {
        if (layers[i] !== prevLayers.current[i]) changed.add(i);
      }
    }
    if (changed.size > 0) {
      setFlashIdx(changed);
      const t = setTimeout(() => setFlashIdx(new Set()), 800);
      prevLayers.current = [...layers];
      return () => clearTimeout(t);
    }
    prevLayers.current = [...layers];
  }, [layers]);

  const stats = useMemo(() => {
    const s = {N:0,T:0,H:0,U:0};
    layers.forEach(l => { if(s[l]!==undefined) s[l]++; });
    return s;
  }, [layers]);

  const STATUS_LABELS = {N:'Normal',T:'Twist',H:'Hooking',U:'Unmeasured'};

  return (
    <div>
      <div className="layer-grid">
        {layers.map((st, i) => (
          <div key={i} className={`layer-cell ${st} ${flashIdx.has(i)?'flash':''}`} title={STATUS_LABELS[st]}>
            <span className="layer-idx">L{String(i+1).padStart(2,'0')}</span>
            <span className="layer-st">{st}</span>
          </div>
        ))}
      </div>
      <div className="layer-stats">
        {['N','T','H','U'].map(s => (
          <div className="stat" key={s}><span className={`dot ${s}`}/><span className="mono">{s}:{stats[s]}</span></div>
        ))}
        <div className="stat" style={{marginLeft:'auto',color:'var(--text-muted)'}}>
          Layer: <span className="mono">{layerCount}/25</span>
          {stats.T+stats.H > 0 && <span style={{marginLeft:8,color:'var(--status-warning)'}}>이상: {((stats.T+stats.H)/25*100).toFixed(1)}%</span>}
        </div>
      </div>
    </div>
  );
}

// =========================================
// ReceivedInfo Component (L2에서 수신한 정보)
// =========================================
function ReceivedInfo({ setup, material, resultChange }) {
  return (
    <div>
      <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:6,fontWeight:600}}>L2 수신 데이터</div>
      {!setup && !material && !resultChange && <div className="empty" style={{padding:12}}>L2 데이터 대기중...</div>}
      {setup && (
        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,color:'var(--status-info)',marginBottom:4}}>생산정보 (1001)</div>
          <div className="rx-info">
            <div className="rx-item"><span className="rx-label">제품명</span><span className="rx-val">{setup.dims_name||'-'}</span></div>
            <div className="rx-item"><span className="rx-label">강종</span><span className="rx-val">{setup.mat_grade||'-'}</span></div>
            <div className="rx-item"><span className="rx-label">QTB</span><span className="rx-val">{setup.qtb_speed||'-'}</span></div>
            <div className="rx-item"><span className="rx-label">SPL-A</span><span className="rx-val">{setup.spl_a_speed||'-'}</span></div>
          </div>
        </div>
      )}
      {material && (
        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,color:'var(--status-info)',marginBottom:4}}>소재정보 (1002)</div>
          <div className="rx-info">
            <div className="rx-item"><span className="rx-label">번들</span><span className="rx-val">{material.bundle_no||'-'}</span></div>
            <div className="rx-item"><span className="rx-label">강편</span><span className="rx-val">{material.mtrl_no||'-'}</span></div>
            <div className="rx-item"><span className="rx-label">Line</span><span className="rx-val">{material.line_no||'-'}</span></div>
            <div className="rx-item"><span className="rx-label">강종</span><span className="rx-val">{material.mat_grade||'-'}</span></div>
            <div className="rx-item"><span className="rx-label">HEAT</span><span className="rx-val">{material.heat_no||'-'}</span></div>
            <div className="rx-item"><span className="rx-label">제품명</span><span className="rx-val">{material.dims_name||'-'}</span></div>
          </div>
        </div>
      )}
      {resultChange && (
        <div>
          <div style={{fontSize:11,color:'var(--status-warning)',marginBottom:4}}>판정변경 (1010)</div>
          <div className="rx-info">
            <div className="rx-item"><span className="rx-label">번들</span><span className="rx-val">{resultChange.bundle_no||'-'}</span></div>
            <div className="rx-item"><span className="rx-label">강편</span><span className="rx-val">{resultChange.mtrl_no||'-'}</span></div>
            <div className="rx-item"><span className="rx-label">Line</span><span className="rx-val">{resultChange.line_no||'-'}</span></div>
            <div className="rx-item"><span className="rx-label">일시</span><span className="rx-val">{resultChange.date||'-'}</span></div>
          </div>
          {resultChange.filenames && resultChange.filenames.filter(f=>f.trim()).length > 0 && (
            <div style={{marginTop:4}}>
              <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:2}}>파일명</div>
              {resultChange.filenames.filter(f=>f.trim()).map((fn,i) => (
                <div key={i} className="mono" style={{fontSize:11,color:'var(--text-secondary)',padding:'1px 0'}}>{fn}</div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// =========================================
// WindingControl Component
// =========================================
function WindingControl({ api, connected, autoWindingActive, autoWindingEnabled }) {
  const [msg, setMsg] = useState('');

  const toggleAutoWinding = async () => {
    const r = autoWindingActive
      ? await api.post('/api/stop-auto-winding')
      : await api.post('/api/start-auto-winding');
    setMsg(r.success !== false ? (autoWindingActive ? '자동 권취 중지' : '자동 권취 시작') : '실패');
    setTimeout(()=>setMsg(''),3000);
  };

  return (
    <div className="card-body">
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:12}}>
        <span style={{fontSize:13,color:'var(--text-secondary)'}}>자동 권취</span>
        <div className={`toggle ${autoWindingActive?'on':''}`} onClick={connected ? toggleAutoWinding : undefined} style={!connected?{opacity:0.4,cursor:'not-allowed'}:{}} />
        <span className="mono" style={{fontSize:12,color:autoWindingActive?'var(--status-ok)':'var(--text-muted)'}}>
          {autoWindingActive ? 'ACTIVE' : 'OFF'}
        </span>
        {msg && <span className="form-msg">{msg}</span>}
      </div>
      <div style={{fontSize:11,color:'var(--text-muted)'}}>
        1002 소재정보 수신 시 자동으로 1101 권취상태를 Layer 1~25까지 단계적 발신합니다.
      </div>
    </div>
  );
}

// =========================================
// LineStatusControl Component
// =========================================
function LineStatusControl({ api, workA, workB, onUpdate }) {
  const setLine = async (field, value) => {
    const body = { work_a: field === 'a' ? value : workA, work_b: field === 'b' ? value : workB };
    await api.post('/api/set-line-status', body);
    onUpdate(body);
  };

  return (
    <div className="card-body">
      <div style={{display:'flex',gap:24,alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:13,width:50}}>A 라인</span>
          <select className="mono" value={workA} onChange={e=>setLine('a',e.target.value)}
            style={{background:'var(--bg-primary)',border:'1px solid var(--border-default)',color:'var(--text-primary)',padding:'4px 8px',borderRadius:3,fontSize:13}}>
            <option value="01">01 (정상)</option>
            <option value="99">99 (비정상)</option>
          </select>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:13,width:50}}>B 라인</span>
          <select className="mono" value={workB} onChange={e=>setLine('b',e.target.value)}
            style={{background:'var(--bg-primary)',border:'1px solid var(--border-default)',color:'var(--text-primary)',padding:'4px 8px',borderRadius:3,fontSize:13}}>
            <option value="01">01 (정상)</option>
            <option value="99">99 (비정상)</option>
          </select>
        </div>
      </div>
      <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8}}>
        1199 Alive 전문에 포함되어 L2 서버로 전송됩니다.
      </div>
    </div>
  );
}

// =========================================
// ManualWindingSend Component (수동 1101 전송)
// =========================================
function ManualWindingSend({ api, connected }) {
  const [form, setForm] = useState({bundle_no:'S78588B031',mtrl_no:'S78588069',line_no:'A'});
  const [layerVals, setLayerVals] = useState(Array(25).fill('N'));
  const [layerCount, setLayerCount] = useState(25);
  const [msg, setMsg] = useState('');
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const setLayer = (i,v) => { const a=[...layerVals]; a[i]=v; setLayerVals(a); };
  const fillAll = (v) => setLayerVals(Array(25).fill(v));

  const send = async () => {
    const r = await api.post('/api/send-winding', {
      ...form, layer_count: layerCount, layers: layerVals
    });
    setMsg(r.success ? 'TC 1101 전송 완료' : '전송 실패 (L2 미접속?)');
    setTimeout(()=>setMsg(''),3000);
  };

  return (
    <div className="card-body">
      <div className="form-grid">
        <div className="form-group"><label>번들번호 (10)</label><input value={form.bundle_no} onChange={e=>set('bundle_no',e.target.value)} maxLength={10}/></div>
        <div className="form-group"><label>강편번호 (10)</label><input value={form.mtrl_no} onChange={e=>set('mtrl_no',e.target.value)} maxLength={10}/></div>
        <div className="form-group"><label>작업 Line</label>
          <select value={form.line_no} onChange={e=>set('line_no',e.target.value)}><option value="A">A</option><option value="B">B</option></select>
        </div>
        <div className="form-group"><label>Layer Count</label>
          <input type="number" min={1} max={25} value={layerCount} onChange={e=>setLayerCount(Math.min(25,Math.max(1,parseInt(e.target.value)||1)))} />
        </div>
      </div>
      <div style={{marginTop:8,marginBottom:4,display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:11,color:'var(--text-muted)'}}>전체 채우기:</span>
        {['N','T','H','U'].map(v=>(
          <button key={v} className="btn btn-sm" onClick={()=>fillAll(v)}
            style={{background:v==='N'?'rgba(63,185,80,0.2)':v==='T'?'rgba(210,153,34,0.2)':v==='H'?'rgba(248,81,73,0.2)':'rgba(110,118,129,0.2)',
                   color:v==='N'?'var(--status-ok)':v==='T'?'var(--status-warning)':v==='H'?'var(--status-critical)':'var(--status-offline)',
                   border:'1px solid var(--border-default)'}}>{v}</button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5, 1fr)',gap:4,marginTop:4}}>
        {layerVals.map((v,i) => (
          <div key={i} style={{display:'flex',alignItems:'center',gap:2}}>
            <span className="mono" style={{fontSize:10,color:'var(--text-muted)',width:24}}>L{String(i+1).padStart(2,'0')}</span>
            <select className="mono" value={v} onChange={e=>setLayer(i,e.target.value)}
              style={{flex:1,background:'var(--bg-primary)',border:'1px solid var(--border-default)',
                     color:v==='N'?'var(--status-ok)':v==='T'?'var(--status-warning)':v==='H'?'var(--status-critical)':'var(--status-offline)',
                     padding:'3px 4px',borderRadius:3,fontSize:12,fontFamily:'JetBrains Mono, monospace'}}>
              <option value="N">N</option><option value="T">T</option><option value="H">H</option><option value="U">U</option>
            </select>
          </div>
        ))}
      </div>
      <div className="form-actions">
        <button className="btn btn-primary" onClick={send} disabled={!connected}>1101 전송</button>
        {msg && <span className="form-msg">{msg}</span>}
      </div>
    </div>
  );
}

// =========================================
// LogPanel Component
// =========================================
function LogPanel({ logs, full }) {
  const [dirFilter, setDirFilter] = useState('ALL');
  const [tcFilter, setTcFilter] = useState('ALL');

  const filtered = useMemo(() => {
    let fl = logs;
    if (dirFilter !== 'ALL') fl = fl.filter(l => l.direction === dirFilter);
    if (tcFilter !== 'ALL') fl = fl.filter(l => l.tc === tcFilter);
    return fl;
  }, [logs, dirFilter, tcFilter]);

  const formatDetail = (log) => {
    const p = log.parsed || {};
    if (log.tc === '1101') return `${p.bundle_no||''} L=${p.layer_count||''}`;
    if (log.tc === '1099') return `cnt=${p.count||''}`;
    if (log.tc === '1199') return `cnt=${p.count||''} A=${p.work_a||''} B=${p.work_b||''}`;
    if (log.tc === '1002') return `${p.bundle_no||''} ${p.dims_name||''} ${p.line_no||''}`;
    if (log.tc === '1001') return `${p.dims_name||''} ${p.mat_grade||''}`;
    if (log.tc === '1010') return `${p.bundle_no||''} ${p.line_no||''}`;
    return `${log.raw?.length||0}B`;
  };

  const rootStyle = full ? {display:'flex',flexDirection:'column',height:'100%'} : {};

  return (
    <div style={rootStyle}>
      <div className="log-filters">
        {['ALL','TX','RX'].map(d => (
          <button key={d} className={`log-filter ${dirFilter===d?'active':''}`} onClick={()=>setDirFilter(d)}>{d}</button>
        ))}
        <span style={{width:1,height:16,background:'var(--border-default)',margin:'0 4px'}}/>
        {['ALL','1001','1002','1010','1099','1101','1199'].map(tc => (
          <button key={tc} className={`log-filter ${tcFilter===tc?'active':''}`} onClick={()=>setTcFilter(tc)}>{tc}</button>
        ))}
      </div>
      <div className={`log-list${full?' full':''}`}>
        {filtered.length === 0 && <div className="empty" style={{padding:12}}>로그 없음</div>}
        {filtered.map((log, i) => (
          <div className="log-entry" key={i}>
            <span className="log-time">{(log.timestamp||'').split(' ').pop()||''}</span>
            <span className={`log-dir ${log.direction}`}>{log.direction}</span>
            <span className="log-tc">TC={log.tc}</span>
            <span className="log-detail">{formatDetail(log)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// =========================================
// Main App
// =========================================
function App() {
  const { wsState, on } = useWebSocket(WS_URL);
  const api = useApi();
  const [page, setPage] = useState('dashboard');
  const [tcpState, setTcpState] = useState('disconnected');
  const [aliveData, setAliveData] = useState({tx:0,rx:0,workA:'01',workB:'01'});
  const [lastRx, setLastRx] = useState('');
  const [layers, setLayers] = useState(Array(25).fill('U'));
  const [layerCount, setLayerCount] = useState(0);
  const [setup, setSetup] = useState(null);
  const [material, setMaterial] = useState(null);
  const [resultChange, setResultChange] = useState(null);
  const [autoWindingActive, setAutoWindingActive] = useState(false);
  const [logs, setLogs] = useState([]);

  const tcpConnected = tcpState !== 'disconnected';

  useEffect(() => {
    on('init_state', (data) => {
      if (data.status) {
        setTcpState(data.status.connection_state || 'disconnected');
        setAliveData({
          tx: data.status.alive_count_tx || 0,
          rx: data.status.alive_count_rx || 0,
          workA: data.status.work_a || '01',
          workB: data.status.work_b || '01',
        });
        setLastRx(data.status.last_alive_rx_time || '');
      }
      if (data.setup) setSetup(data.setup);
      if (data.material) setMaterial(data.material);
      if (data.result_change) setResultChange(data.result_change);
      if (data.auto_winding_active !== undefined) setAutoWindingActive(data.auto_winding_active);
      if (data.coils && data.coils.length > 0) {
        const c = data.coils[data.coils.length - 1];
        if (c.layers && c.layers.length > 0) {
          setLayers(c.layers.map(l => l.status));
          setLayerCount(c.layer_count);
        }
      }
      if (data.logs) setLogs(data.logs);
    });
    on('connection_changed', (data) => {
      setTcpState(data.state);
    });
    on('alive_received', (data) => {
      setAliveData(d => ({...d, rx: data.count}));
      setLastRx(data.timestamp);
    });
    on('setup_received', (data) => {
      setSetup(data);
    });
    on('material_received', (data) => {
      setMaterial(data);
    });
    on('result_change_received', (data) => {
      setResultChange(data);
    });
    on('winding_status', (data) => {
      if (data.layers) setLayers(data.layers.map(l => l.status));
      setLayerCount(data.layer_count || 0);
    });
    on('auto_winding_changed', (data) => {
      setAutoWindingActive(data.active);
    });
    on('line_status_changed', (data) => {
      setAliveData(d => ({...d, workA: data.work_a, workB: data.work_b}));
    });
    on('packet_log', (data) => {
      setLogs(prev => [{...data}, ...prev].slice(0, 500));
      if (data.tc === '1199' && data.direction === 'TX') setAliveData(d => ({...d, tx: data.parsed?.count || d.tx}));
    });
  }, [on]);

  return (
    <div className="app">
      <Header tcpState={tcpState} wsState={wsState} aliveData={aliveData} lastRx={lastRx} />

      <div className="sidebar">
        <div className="nav-label">SPL</div>
        <div className={`nav-item ${page==='dashboard'?'active':''}`} onClick={()=>setPage('dashboard')}>대시보드</div>
        <div className={`nav-item ${page==='control'?'active':''}`} onClick={()=>setPage('control')}>제어 패널</div>
        <div className={`nav-item ${page==='logs'?'active':''}`} onClick={()=>setPage('logs')}>전문 로그</div>
      </div>

      <div className="main">
        {page === 'dashboard' && (
          <>
            <div className="grid-row grid-top">
              <div className="card">
                <div className="card-header">L2 수신 정보</div>
                <div className="card-body"><ReceivedInfo setup={setup} material={material} resultChange={resultChange} /></div>
              </div>
              <div className="card">
                <div className="card-header">
                  <span>25-Layer 권취상태 (SPL → L2)</span>
                  <span className="mono" style={{fontSize:11,color:autoWindingActive?'var(--status-ok)':'var(--text-muted)'}}>
                    {autoWindingActive ? 'AUTO' : 'MANUAL'}
                  </span>
                </div>
                <div className="card-body"><LayerGrid layers={layers} layerCount={layerCount} /></div>
              </div>
            </div>
            <div className="card">
              <div className="card-header">전문 로그</div>
              <div style={{overflow:'hidden'}}><LogPanel logs={logs}/></div>
            </div>
          </>
        )}

        {page === 'control' && (
          <>
            <div className="card">
              <div className="card-header">수동 1101 전송 (권취상태 → L2)</div>
              <ManualWindingSend api={api} connected={tcpConnected} />
            </div>
            <div className="card">
              <div className="card-header">자동 판정 시뮬레이션</div>
              <WindingControl api={api} connected={tcpConnected} autoWindingActive={autoWindingActive} autoWindingEnabled={true} />
            </div>
            <div className="card">
              <div className="card-header">라인 가동상태 (1199 Alive)</div>
              <LineStatusControl
                api={api}
                workA={aliveData.workA}
                workB={aliveData.workB}
                onUpdate={(d)=>setAliveData(a=>({...a,workA:d.work_a,workB:d.work_b}))}
              />
            </div>
            <div className="card">
              <div className="card-header">L2 수신 정보</div>
              <div className="card-body"><ReceivedInfo setup={setup} material={material} resultChange={resultChange} /></div>
            </div>
          </>
        )}

        {page === 'logs' && (
          <div className="card" style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
            <div className="card-header">전문 송수신 로그</div>
            <div style={{flex:1,minHeight:0,overflow:'hidden',display:'flex',flexDirection:'column'}}>
              <LogPanel logs={logs} full/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
